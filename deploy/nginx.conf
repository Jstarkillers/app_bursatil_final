# Nginx — NEXO BOLSA
# Copiar a: /etc/nginx/sites-available/nexobolsa
# Activar con: sudo ln -s /etc/nginx/sites-available/nexobolsa /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;   # Acepta cualquier hostname (red local)

    # Archivos estáticos del frontend servidos directamente por nginx
    location /static/ {
        alias /opt/nexobolsa/frontend/;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Imágenes y recursos del frontend
    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        root /opt/nexobolsa/frontend;
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Todo lo demás → gunicorn
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Tamaño máximo de body (para uploads futuros)
        client_max_body_size 5M;
    }
}
